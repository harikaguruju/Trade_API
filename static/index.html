<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Market Analysis Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>

<style>

/* GLOBAL */
body {
    margin: 0;
    font-family: "Inter", sans-serif;
    background: linear-gradient(135deg, #020617, #0f172a);
    color: white;
}

/* LOGIN */
.login {
    display: flex;
    height: 100vh;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: rgba(17,24,39,0.6);
    backdrop-filter: blur(12px);
    padding: 30px;
    border-radius: 16px;
    width: 320px;
    animation: fadeIn 1s ease;
}

.hint {
    font-size: 13px;
    opacity: 0.7;
    margin-bottom: 10px;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin-bottom: 12px;
    border-radius: 8px;
    border: none;
    background: #020617;
    color: white;
}

input::placeholder {
    color: #94a3b8;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg,#6366f1,#3b82f6);
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(99,102,241,0.6);
}

/* DASHBOARD */
.dashboard { display: block; }

.sidebar {
    width: 220px;
    background: #020617;
    padding: 20px;
    height: 100vh;
    position: fixed;
}

/* MAIN */
.main {
    margin-left: 220px;
    padding: 30px 30px 30px 40px;
}

.main h2 {
    margin-top: 0;
    font-size: 28px;
    font-weight: bold;
    background: linear-gradient(90deg,#60a5fa,#a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 20px;
    border-radius: 16px;
    margin-bottom: 15px;
}

/* RESULT */
.result {
    background: #020617;
    padding: 15px;
    border-radius: 10px;
    min-height: 120px;
}

/* STATS */
.top-cards {
    display: none;
    grid-template-columns: repeat(3,1fr);
    gap: 20px;
    margin-bottom: 20px;
}

.stat-card {
    padding: 20px;
    border-radius: 16px;
    font-weight: bold;
}

.green { background: linear-gradient(#22c55e,#16a34a); }
.orange { background: linear-gradient(#f97316,#ea580c); }
.blue { background: linear-gradient(#3b82f6,#2563eb); }

/* LOADER */
.loader {
    width: 50px;
    height: 50px;
    border: 5px solid #1e293b;
    border-top: 5px solid #6366f1;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 20px auto;
}

@keyframes spin { 100% { transform: rotate(360deg); } }

canvas { margin-top: 15px; }

</style>
</head>

<body>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

<div class="sidebar">
    <h3>📊 Dashboard</h3>
    <p style="opacity:0.6; font-size:14px;">Market Insights Tool</p>
</div>

<div class="main">
<h2>Market Analysis</h2>

<div class="top-cards" id="stats">
    <div class="stat-card green">
        📈 Growth
        <h2 id="growthVal">-</h2>
        <p id="growthText"></p>
    </div>

    <div class="stat-card orange">
        ⚠️ Risk
        <h2 id="riskVal">-</h2>
        <p id="riskText"></p>
    </div>

    <div class="stat-card blue">
        🚀 Demand
        <h2 id="demandVal">-</h2>
        <p id="demandText"></p>
    </div>
</div>

<div class="card">
    <h3>Analyze Sector</h3>
    <input id="sector" placeholder="e.g. healthcare, technology">
    <button id="analyzeBtn" onclick="analyze()">🚀 Generate Report</button>
</div>

<div class="card">
    <h3>Analysis Result</h3>
    <button onclick="downloadPDF()">Download PDF</button>

    <div id="result" class="result">
        <p style="opacity:0.6; text-align:center;">
            📊 Enter a sector (e.g. healthcare, technology) to generate insights
        </p>
    </div>

    <canvas id="chart"></canvas>
</div>

</div>
</div>

<script>

let chart;

/* ================= REAL MARKET DATA ================= */
function getMarketData(sector) {
    sector = sector.toLowerCase();

    if (sector.includes("health")) {
        return {
            size: "$372 Billion (India Healthcare Market)",
            growth: "14% CAGR",
            companies: [
                {
                    name: "Apollo",
                    logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3c/Apollo_Hospitals_Logo.svg/512px-Apollo_Hospitals_Logo.svg.png"
                },
                {
                    name: "Fortis",
                    logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/86/Fortis_Healthcare_logo.svg/512px-Fortis_Healthcare_logo.svg.png"
                },
                {
                    name: "Dr Reddy's",
                    logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Dr._Reddy%27s_Laboratories_logo.svg/512px-Dr._Reddy%27s_Laboratories_logo.svg.png"
                }
            ]
        };
    }

    if (sector.includes("tech")) {
        return {
            size: "$245 Billion (Indian IT Market)",
            growth: "10% CAGR",
            companies: [
                {
                    name: "TCS",
                    logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b1/Tata_Consultancy_Services_Logo.svg/512px-Tata_Consultancy_Services_Logo.svg.png"
                },
                {
                    name: "Infosys",
                    logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/9/95/Infosys_logo.svg/512px-Infosys_logo.svg.png"
                },
                {
                    name: "Wipro",
                    logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/8c/Wipro_Primary_Logo_Color_RGB.svg/512px-Wipro_Primary_Logo_Color_RGB.svg.png"
                }
            ]
        };
    }

    return {
        size: "$100 Billion",
        growth: "8% CAGR",
        companies: []
    };
}/* ================= FORMAT REPORT ================= */
function formatReport(text, metrics, sector) {

    const market = getMarketData(sector);

    let html = `
    <div style="line-height:1.6">

    <h2 style="color:#60a5fa;">📊 Market Analysis: ${sector}</h2>

    <div style="margin-bottom:15px; font-size:14px; opacity:0.9;">
        <b>Growth:</b> ${metrics.growth}/100 |
        <b>Risk:</b> ${metrics.risk}/100 |
        <b>Demand:</b> ${metrics.demand}/100
    </div>
    `;

    /* AI CONTENT */
    html += text
        .replace(/^# (.*)$/gm, "")
        .replace(/^## (.*)$/gm, "<h3 style='margin-top:15px;'>$1</h3>")
        .replace(/^- (.*)$/gm, "<li>$1</li>")
        .replace(/(<li>.*<\/li>)/g, "<ul style='margin-left:18px;'>$1</ul>");

    /* MARKET SIZE */
    html += `
    <div style="margin-top:20px;">
        <h3>📈 Market Size & Growth</h3>
        <p><b>Estimated Size:</b> ${market.size}</p>
        <p><b>Growth Rate:</b> ${market.growth}</p>
    </div>
    `;

    /* COMPANIES */
if (market.companies.length > 0) {
    html += `
    <div style="margin-top:20px;">
        <h3>🏢 Key Companies</h3>
        <div style="display:flex; gap:25px; flex-wrap:wrap;">
    `;

    market.companies.forEach(c => {
        html += `
        <div style="
            text-align:center;
            transition:0.3s;
            padding:10px;
            border-radius:12px;
        "
        onmouseover="this.style.transform='scale(1.1)'"
        onmouseout="this.style.transform='scale(1)'"
        >
            <img src="${c.logo}"
                 width="60"
                 height="60"
                 style="
                    border-radius:12px;
                    background:white;
                    padding:6px;
                    object-fit:contain;
                    box-shadow:0 0 10px rgba(0,0,0,0.3);
                 "
                 onerror="this.onerror=null; this.src='https://cdn-icons-png.flaticon.com/512/3135/3135715.png';">

            <div style="margin-top:6px;">
                <small>${c.name}</small>
            </div>
        </div>`;
    });

    html += `</div></div>`;
}

    /* 🔥 NEW: MARKET SCORE VISUAL BOX */
    html += `
    <div style="
        margin-top:20px;
        display:flex;
        gap:10px;
        flex-wrap:wrap;
    ">
        <div style="background:#22c55e;padding:10px;border-radius:8px;">
            Growth: ${metrics.growth}
        </div>
        <div style="background:#f97316;padding:10px;border-radius:8px;">
            Risk: ${metrics.risk}
        </div>
        <div style="background:#3b82f6;padding:10px;border-radius:8px;">
            Demand: ${metrics.demand}
        </div>
    </div>
    `;

    /* KEY DRIVERS */
    html += `
    <div style="margin-top:20px;">
        <h3>⚙️ Key Growth Drivers</h3>
        <ul>
            <li>Government policies and incentives</li>
            <li>Technological advancements (AI, automation)</li>
            <li>Rising consumer demand</li>
            <li>Startup ecosystem growth</li>
        </ul>
    </div>
    `;

    /* CHALLENGES */
    html += `
    <div style="margin-top:20px;">
        <h3>⚠️ Challenges</h3>
        <ul>
            <li>Regulatory hurdles</li>
            <li>High competition</li>
            <li>Cost and scalability issues</li>
            <li>Skill shortages</li>
        </ul>
    </div>
    `;

    /* INVESTMENT */
    html += `
    <div style="margin-top:20px;">
        <h3>💰 Investment Insights</h3>
        <ul>
            <li>Strong investor interest in ${sector}</li>
            <li>VC funding is increasing</li>
            <li>Private equity participation rising</li>
        </ul>
    </div>
    `;

    /* FINAL INSIGHTS BOX */
    html += `
    <div style="
        margin-top:20px;
        padding:15px;
        border-radius:10px;
        background: rgba(59,130,246,0.1);
        border: 1px solid rgba(59,130,246,0.3);
    ">
        <h3>📌 Key Insights</h3>
        <ul>
            <li>High growth potential in ${sector}</li>
            <li>Increasing innovation and investment</li>
            <li>Market competition is intensifying</li>
        </ul>
    </div>
    `;

    /* 🔥 NEW: STRATEGY RECOMMENDATION */
    html += `
    <div style="margin-top:20px;">
        <h3>📊 Strategic Recommendation</h3>
        <p>
            Businesses should focus on innovation, cost optimization, and customer-centric strategies
            to gain a competitive advantage in the ${sector} sector.
        </p>
    </div>
    `;

    /* FUTURE OUTLOOK */
    html += `
    <div style="margin-top:20px;">
        <h3>🚀 Future Outlook</h3>
        <p>
            The ${sector} sector is expected to grow significantly over the next decade.
            Digital transformation, innovation, and strategic investments will drive long-term expansion.
        </p>
    </div>
    `;

    html += `</div>`;

    return html;
}/* ================= ANALYZE ================= */
async function analyze() {

    const sector = document.getElementById("sector").value.trim();
    if (!sector) {
        alert("Please enter a sector");
        return;
    }

    const resultDiv = document.getElementById("result");
    const btn = document.getElementById("analyzeBtn");

    resultDiv.innerHTML = `
        <div class="loader"></div>
        <p style="text-align:center;">Analyzing market trends...</p>
    `;

    btn.innerHTML = "⏳ Analyzing...";
    btn.disabled = true;

    try {
    const API_BASE = window.location.origin;

    const res = await fetch(`${API_BASE}/analyze/${sector}`, {
        headers: { "x-api-key": "mysecret123" }
    });

        const data = await res.json();

        let g = Math.floor(Math.random() * 30) + 70;
        let r = Math.floor(Math.random() * 40) + 40;
        let d = Math.floor(Math.random() * 30) + 60;

        document.getElementById("growthVal").innerText = g;
        document.getElementById("riskVal").innerText = r;
        document.getElementById("demandVal").innerText = d;

        document.getElementById("growthText").innerText = g > 75 ? "Strong Growth 📊" : "Moderate";
        document.getElementById("riskText").innerText = r > 60 ? "Higher Risk ⚠️" : "Low Risk";
        document.getElementById("demandText").innerText = d > 70 ? "High Demand 🔥" : "Stable";

        document.getElementById("stats").style.display = "grid";

        resultDiv.innerHTML = formatReport(data.report, {
            growth: g,
            risk: r,
            demand: d
        }, sector);

        updateChart(sector);

    } catch (err) {
        resultDiv.innerHTML = "❌ Error fetching data";
    }

    btn.innerHTML = "🚀 Generate Report";
    btn.disabled = false;
}

/* ================= TREND GRAPH ================= */
function updateChart(sector) {

    if (chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"), {
        type: "line",
        data: {
            labels: ["2019","2020","2021","2022","2023","2024"],
            datasets: [{
                label: sector + " Market Trend",
                data: [
                    60 + Math.random()*20,
                    65 + Math.random()*20,
                    70 + Math.random()*20,
                    75 + Math.random()*20,
                    80 + Math.random()*20,
                    85 + Math.random()*20
                ],
                fill: true,
                tension: 0.4,
                borderWidth: 3,
                pointRadius: 4
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    labels: {
                        color: "white"
                    }
                }
            },
            scales: {
                x: {
                    ticks: { color: "white" }
                },
                y: {
                    ticks: { color: "white" }
                }
            }
        }
    });
}
/* ================= PDF ================= */
function downloadPDF() {
    html2pdf().from(document.getElementById("result")).save();
}

</script></body>
</html>
